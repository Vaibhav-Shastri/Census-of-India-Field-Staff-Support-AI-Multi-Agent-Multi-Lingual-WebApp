  Census of India   Agent — Knowledge Transfer Part 5: Supervisor Duties & Verification Procedures
  ________________________________________
  Overview
  Supervisors play a critical role in ensuring the quality, completeness, and legality of census data collection. They oversee enumerators, verify work, manage certifications, and escalate issues.
  ________________________________________
  Supervisory Responsibilities During Houselisting Phase (Manual 02)
  • Verify layout maps, house numbering, and houselisting schedules for completeness and correctness.
  • Conduct field visits to cross-check enumerators’ listings and numbering.
  • Ensure no buildings or census houses are missed or double counted.
  • Validate Houselisting Abstracts submitted by enumerators.
  • Sign Annexure-6: Supervisor’s certificate confirming full coverage and material inventory.
  • Maintain accurate inventory of schedules, maps, and other census materials.
  ________________________________________
  Supervisory Responsibilities During Enumeration Phase (Manual 01)
  • Oversee enumerators during population enumeration to ensure full household and individual coverage.
  • Verify accuracy and completeness of Abridged Houselist updates and Household Schedules.
  • Monitor enumerators’ adherence to legal and procedural requirements.
  • Supervise revisional rounds and ensure births, deaths, and visitors are recorded properly.
  • Collect and review enumerators’ Abstracts and Working Sheets.
  • Sign certification forms acknowledging receipt and verification of materials.
  ________________________________________
  Verification and Certification Process
  • Supervisors must carefully check every schedule for completeness and coding accuracy.
  • They reconcile totals across schedules, abstracts, and summaries.
  • Ensure proper handling of special cases (houseless, institutional, large households).
  • Confirm all forms and annexures are signed and dated correctly.
  • Escalate unresolved discrepancies or refusals to Charge Officer promptly.
  ________________________________________
  Legal & Ethical Obligations
  • Supervisors uphold Census Act provisions and confidentiality at all times.
  • They serve as the final checkpoint before data submission from the field.
  • Responsible for inventory control to prevent data loss or misuse.
  • Must lead by example, maintaining professionalism and ethical standards.
  ________________________________________
  Tips for   Agent Supporting Supervisors
  • Emphasize the importance of field verification and cross-checks.
  • Guide supervisors on certification formats and procedural checklists.
  • Provide support for conflict resolution and handling enumerator issues.
  • Stress confidentiality and legal responsibilities.
  • Encourage proactive communication with Charge Officers.
  ________________________________________

   
