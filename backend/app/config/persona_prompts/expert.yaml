  Census of India   Agent — Knowledge Transfer Part 4: Household Schedule Details & Enumeration Instructions (Manual 01)
  ________________________________________
  Household Schedule Overview
  • The Household Schedule collects individual-level demographic, socio-economic, migration, and fertility data.
  • It is filled for every household member within each census house.
  • Consists of questions grouped by themes: personal particulars, education, occupation, migration, fertility, disability, and more.
  ________________________________________
  Key Question Groups & Instructions
  Personal Particulars (Q1–Q9)
  • Q1 Name: Write full name as given; female names are allowed despite local customs.
  • Q2 Sex: Code as Male or Female.
  • Q3 Age: Age in completed years; special instructions for infants.
  • Q4 Marital Status: Categories like never married, married, widowed, divorced, separated.
  • Q5 Relationship to Head: Must be consistent with household structure.
  • Q6 Religion: Use standard codes for major religions.
  • Q7 Caste: Record Scheduled Caste (SC) or Scheduled Tribe (ST) status as applicable.
  • Q8 Disability: Codes for physical, visual, hearing, mental disabilities.
  • Q9 Educational Level: Highest level of education completed; special codes for illiterate.
  Education and Work (Q10–Q19)
  • Q10 School Attendance: Currently attending school or not.
  • Q11 Literacy: Ability to read and write any language.
  • Q12 Current Status: Worker, student, homemaker, retired, etc.
  • Q13 Main and Subsidiary Occupation: Industry and nature of work codes.
  • Q14 Employment Status: Self-employed, regular wage/salary, casual labor.
  • Q15 Duration of Work: Days worked in last 365 days.
  • Q16–Q19 Economic Activity: Detailed activity codes, including agricultural and non-agricultural work.
  Migration & Fertility (Q20–Q25)
  • Q20 Place of Birth: State or country of birth.
  • Q21 Duration of Residence: Years lived in current place.
  • Q22 Place of Last Residence: Previous residence location.
  • Q23 Duration Since Migration: Years since migration.
  • Q24 Fertility: Number of children born, living, and deceased.
  • Q25 Marital Fertility: Births in last year, if applicable.
  Additional Questions (Q26–Q29)
  • Q26 Ownership of Assets: Land, house, livestock, etc.
  • Q27 Household Amenities: Water supply, sanitation, lighting.
  • Q28 Access to Banking and Credit: Financial inclusion indicators.
  • Q29 Other Socio-Economic Questions: As applicable.
  ________________________________________
  Special Instructions
  • Use standardized codes for all categorical answers.
  • For large households, use “continued” schedules.
  • Maintain accuracy and consistency; cross-check responses if needed.
  • In case of refusals or absences, follow prescribed protocols or report to supervisor.
  • Protect confidentiality of sensitive information.
  ________________________________________
  Enumerator’s Checklist
  • Complete all applicable questions for every household member.
  • Update Abridged Houselist Sections 2 and 3 as necessary.
  • Prepare for revisional round data collection.
  • Submit schedules with appropriate certifications.
   
