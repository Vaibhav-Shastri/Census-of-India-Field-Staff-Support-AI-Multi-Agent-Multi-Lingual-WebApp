  Census of India   Agent — Knowledge Transfer Part 1: Overview & Legal Framework
  ________________________________________
  Census Overview
  • The Census of India is a massive decennial exercise providing vital data for national planning, governance, and policy-making.
  • The 2011 Census is the 15th in an unbroken series since 1872 and the 7th after independence.
  • Census is conducted in two main phases:
    1. Houselisting and Housing Census (April–September 2010): Mapping and recording physical housing structures and amenities.
    2. Population Enumeration (Feb 9 – Mar 5, 2011): Collecting detailed data on individuals and households based on the housing frame.
  • The reference date (“census moment”) is 00:00 hours, March 1, 2011.
  • Enumerators must cover all buildings, census houses, households, and individuals, including houseless population on census night.
  • Supervisors oversee data quality, coverage, and legal compliance at every stage.
  ________________________________________
  Legal Framework & Duties
  • The census is governed by the Census Act, 1948, which legally empowers enumerators and supervisors and mandates confidentiality.
  • Rights under the Census Act include:
    o Entering premises to carry out census duties, respecting local customs.
    o Painting or affixing census numbers on buildings and houses.
    o Asking questions printed in the official census schedules.
    o Receiving truthful answers from respondents (with cultural sensitivities respected, e.g., female names).
  • Obligations and Penalties:
    o Enumerators and supervisors must perform their duties diligently and within guidelines.
    o Failure, obstruction, or negligent behavior can lead to fines (up to ₹1000) and imprisonment (up to 3 years).
    o Disclosure of confidential census information without permission is strictly prohibited and punishable.
  • Additional provisions protect census workers from service disadvantages and protect those acting in good faith during census operations.
  ________________________________________
  Confidentiality & Data Protection
  • All census data collected is strictly confidential and protected by law.
  • Census officers are legally bound to protect personal information and use it only for census purposes.
  • No census records or schedules are admissible as evidence in legal proceedings except under the Census Act.
  ________________________________________
  Role Mindset
  • Always emphasize the legal sanctity and national importance of the census work.
  • Guide enumerators and supervisors to respect respondents, maintain confidentiality, and adhere strictly to census guidelines.
  • Highlight that census data supports nation-building and public welfare planning.
  • Keep the reference dates and phases clear to avoid confusion.
  ________________________________________
   
  ________________________________________
  Census of India   Agent — Knowledge Transfer Part 2: Houselisting & Housing Census Phase (Manual 02)
  ________________________________________
  Purpose and Scope
  • Conducted first in the census process (April–September 2010).
  • Maps and records all buildings, census houses, and households physically present in the Enumeration Block (EB).
  • Documents housing construction materials, conditions, and amenities/assets such as water, electricity, and sanitation.
  • Provides the foundation for population enumeration by creating a comprehensive housing frame.
  ________________________________________
  Key Concepts & Definitions
  • Enumeration Block (EB): The smallest geographic area assigned to an enumerator.
  • Building: A structure with walls and roof; may contain multiple Census houses.
  • Census House: A separate unit within a building with its own entrance, may be residential or non-residential.
  • Household: Group sharing common kitchen; types include Normal, Institutional, and Houseless.
  • Layout Map: Detailed sketch of the EB showing building locations, roads, landmarks, and boundaries.
  ________________________________________
  Main Activities of Enumerator
  1. Prepare Layout Maps:
    o Draw clear, accurate maps showing all buildings and physical features.
    o Use prescribed orientation and symbols.
  2. Number Buildings and Census Houses:
    o Assign unique numbers systematically (usually north-west to south-east).
    o Use sub-numbers for multiple houses within a building.
  3. Fill Houselisting and Housing Census Schedule:
    o Record each census house’s characteristics (material, use, condition).
    o Document amenities like water source, sanitation, lighting, and drainage.
  4. Prepare Houselisting Abstract:
    o Summarize data on building types, materials, and amenities for the EB.
  5. Certify and Submit:
    o Complete and sign Annexure-5: Enumerator’s certificate confirming coverage and inventory of material.
    o Submit schedules, maps, and abstracts to supervisor.
  ________________________________________
  Supervisor’s Role
  • Verify enumerator’s maps, numbering, and schedules for completeness and accuracy.
  • Conduct field checks and assist enumerators with difficult cases.
  • Certify complete coverage by signing Annexure-6: Supervisor’s certificate.
  • Ensure all documents and materials are properly accounted for.
  ________________________________________
  Legal and Procedural Compliance
  • Follow Census Act guidelines strictly.
  • Maintain confidentiality of all data collected.
  • Ensure no household or building is omitted or double counted.
  • Handle refusals and difficult cases professionally, escalating to supervisors or Charge Officer if needed.
  ________________________________________
  Key Annexures and Documents
  Document: Purpose
  Houselisting Schedule: Record housing details and amenities
  Houselisting Abstract: Summary of housing data for Enumeration Block
  Annexure-5: Enumerator’s certificate of coverage and inventory
  Annexure-6: Supervisor’s certificate confirming coverage
  Layout Maps: Geographic representation of Enumeration Block
  ________________________________________
  Summary for   Agent
  • Manual 02 creates the housing frame for enumeration.
  • Accurate mapping, numbering, and documentation of housing stock is crucial.
  • Enumerator and supervisor roles are complementary and vital for data quality.
  • Legal compliance, confidentiality, and full coverage are non-negotiable.
  • All forms and annexures must be completed and certified properly before population enumeration begins.
  ________________________________________
   
  ________________________________________
  Census of India   Agent — Knowledge Transfer Part 3: Population Enumeration Phase & Abridged Houselist Updates (Manual 01)
  ________________________________________
  Overview of Enumeration Phase
  • Conducted second, after houselisting phase (Feb 9 – Mar 5, 2011).
  • Enumerators update and verify the Abridged Houselist (AHL) prepared during houselisting.
  • Enumerate all individuals in each household, collecting detailed demographic, socio-economic, migration, and fertility data.
  • Special enumeration of the houseless population on the census night (Feb 28, 2011).
  • Conduct a revisional round from Mar 1–5, 2011 to capture births, deaths, and visitors.
  ________________________________________
  Abridged Houselist (AHL) Update
  • Section 2: Update details of existing buildings, census houses, and households; record changes such as demolitions, households moving out, or vacant houses.
  • Section 3: Record new buildings, census houses, and households found during enumeration but missed earlier.
  • Section 4: Document places where houseless populations are found on census night.
  • Sections 5 & 6: Completed after revisional round to finalize coverage and inventory.
  ________________________________________
  Duties of Enumerator Before Enumeration
  • Attend training and thoroughly study the Household Schedule and manuals.
  • Obtain all census material, including lists of Scheduled Castes/Scheduled Tribes relevant to the area.
  • Establish rapport with the community, explain census purpose, and show official ID.
  • Familiarize with the Enumeration Block, its boundaries, and landmarks.
  ________________________________________
  Duties of Enumerator During Enumeration
  • Visit every building, census house, and household in the EB without omission.
  • Fill the Household Schedule accurately for each household member, following question-by-question instructions.
  • Update Section 2 and fill Sections 3 and 4 of the AHL concurrently.
  • Enumerate the houseless population on census night (Feb 28, 2011).
  ________________________________________
  Duties of Enumerator After Enumeration
  • Conduct the revisional round (Mar 1–5, 2011) to record births, deaths, and visitors.
  • Review all schedules and AHL sections for completeness and accuracy.
  • Fill the Enumerator’s Abstract and Working Sheets.
  • Arrange and submit all census documents, including certificates, to supervisor.
  ________________________________________
  Honorarium and Recognition
  • Enumerators are paid an honorarium for their legal duties.
  • Meritorious work is recognized and appreciated by the government.
  ________________________________________
  Important Notes for   Agent
  • Emphasize complete, accurate coverage of all households and individuals.
  • Stress the updating and validation of the Abridged Houselist as a critical step.
  • Maintain confidentiality and professionalism throughout enumeration.
  • Guide enumerators on managing special cases and revisional updates.
